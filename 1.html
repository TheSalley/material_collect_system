<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let jsonData = document
        .querySelector(".color-box .elementor-widget-container")
        .innerText.split(";")
        .map((i) => {
          return {
            label: i.split(":")[0],
            value: i.split(":")[1],
          };
        });

      jsonData.forEach((item) => {
        document.querySelector(".color-box").innerHTML +=
          `<button class="varient-btn" color="${item.value}">${item.label}</button>`;
      });

      function hexToRgbArray(hex) {
        let shorthand = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
        hex = hex.replace(shorthand, (m, r, g, b) => r + r + g + g + b + b);

        let result =
          /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})?$/i.exec(hex);

        if (!result) {
          console.error("Invalid hex color:", hex);
          return [1, 1, 1, 1];
        }

        const r = parseInt(result[1], 16) / 255;
        const g = parseInt(result[2], 16) / 255;
        const b = parseInt(result[3], 16) / 255;
        const a = result[4] ? parseInt(result[4], 16) / 255 : 1;

        return [r, g, b, a];
      }
      const modelViewer = document.getElementById("myModel");
      modelViewer.addEventListener("load", () => {
        console.log(modelViewer.model.materials);
        document.querySelectorAll(".varient-btn").forEach((item) => {
          item.addEventListener("click", () => {
            let handle_color = hexToRgbArray(item.getAttribute("color"));
            console.log("获取到的颜色：", handle_color)
            modelViewer.model.materials[2].pbrMetallicRoughness.setBaseColorFactor(
              handle_color
            );
          });
        });
      });
    </script>
  </body>
</html>
